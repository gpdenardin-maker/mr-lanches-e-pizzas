<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&R Lanches e Pizzas - Cardápio Digital Oficial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-principal: #0a0a0a;
            --bg-card: #141414;
            --cor-destaque: #ff5100;
            --cor-destaque-glow: #ff7300;
            --cor-ouro: #ffb703;
            --texto-claro: #ffffff;
            --texto-cinza: #a8a8a8;
            --sucesso: #25d366;
            --sucesso-hover: #1ebd52;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            line-height: 1.5;
        }

        /* BARRA DE NAVEGAÇÃO */
        header {
            background: rgba(10, 10, 10, 0.85);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--cor-destaque);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 1px;
            color: var(--texto-claro);
            text-shadow: 0 0 10px rgba(255, 81, 0, 0.3);
        }

        .logo span {
            color: var(--cor-destaque);
        }

        .status-badge {
            background-color: var(--sucesso);
            color: #000;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
            animation: pulse 2s infinite;
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #000;
            border-radius: 50%;
        }

        /* HERO SECTION (BANNER PRINCIPAL) */
        .hero {
            position: relative;
            background: linear-gradient(rgba(0, 0, 0, 0.6), #0a0a0a), 
                        url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1600') no-repeat center center/cover;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(transparent, var(--bg-principal));
            pointer-events: none;
        }

        .hero-content {
            z-index: 2;
            max-width: 800px;
        }

        .hero-title-top {
            font-family: 'Pacifico', cursive;
            color: var(--cor-ouro);
            font-size: 34px;
            margin-bottom: -5px;
            transform: rotate(-3deg);
            display: inline-block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 76px;
            line-height: 0.9;
            color: var(--texto-claro);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0px 4px 15px rgba(255, 81, 0, 0.6);
        }

        .hero p {
            font-size: 18px;
            color: #e0e0e0;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .hero-btn {
            background: linear-gradient(135deg, var(--cor-destaque) 0%, #ff2a00 100%);
            color: var(--texto-claro);
            text-decoration: none;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(255, 81, 0, 0.4);
            transition: all 0.3s ease;
            display: inline-block;
        }

        /* SEÇÃO DE LOGÍSTICA (ENDEREÇO E TROCO SALVOS AUTOMATICAMENTE) */
        .secao-logistica {
            max-width: 800px;
            margin: -30px auto 30px auto;
            background: #111111;
            border: 2px solid var(--cor-destaque);
            border-radius: 16px;
            padding: 22px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .logistica-titulo {
            font-size: 16px;
            font-weight: 700;
            color: var(--cor-ouro);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logistica-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .logistica-grid { grid-template-columns: 1fr; }
        }

        .campo-grupo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .campo-grupo label {
            font-size: 12px;
            font-weight: 600;
            color: #d0d0d0;
        }

        .input-text {
            background-color: #1a1a1a;
